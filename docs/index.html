<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyProject Automation Dashboard</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
margin:40px;
}

h1{
color:#38bdf8;
}

.panel{
background:#1e293b;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}

pre{
white-space:pre-wrap;
}

.status{
color:#22c55e;
font-weight:bold;
}
</style>

<meta http-equiv="refresh" content="60">

</head>

<body>

<h1>🚀 MyProject Automation Dashboard</h1>

<div class="panel">
<h2>Automation Status</h2>
<div class="status">ACTIVE</div>
</div>

<div class="panel">
<h2>Current Version</h2>
<pre id="version">Loading...</pre>
</div>

<div class="panel">
<h2>Recent Commits</h2>
<pre id="commits">Loading...</pre>
</div>

<div class="panel">
<h2>Changelog</h2>
<pre id="changelog">Loading...</pre>
</div>

<script>

async function loadData(){

try{

const version =
await fetch('version.txt').then(r=>r.text());

const commits =
await fetch('commits.txt').then(r=>r.text());

const changelog =
await fetch('CHANGELOG.md').then(r=>r.text());

document.getElementById('version').textContent = version;
document.getElementById('commits').textContent = commits;
document.getElementById('changelog').textContent = changelog;

}
catch(e){
console.error("Dashboard load error:",e);
}

}

loadData();

</script>

</body>
</html>
