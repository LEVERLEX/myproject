name: AutoPush

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 23 * * *'  # Runs every day at 23:00 UTC

jobs:
  autopush:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name "LEVERLEX"
          git config --global user.email "cleverlexdigitals@gmail.com"

      - name: Auto-increment version
        run: |
          VERSION_FILE="VERSION"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "1.0.0" > $VERSION_FILE
          fi
          CURRENT=$(cat $VERSION_FILE)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "$NEW" > $VERSION_FILE
          git add $VERSION_FILE
          git commit -m "Release v$NEW" || echo "No changes to commit"
          git tag "v$NEW" || echo "Tag exists"
          git push origin main --tags || echo "Push failed"
