#!/bin/bash

#############################################
# LEVERLEX AUTONOMOUS ENGINE (REAL MODE)
#############################################

set -e
trap 'echo "[ERROR] Line $LINENO | Exit Code $?" >> logs/errors.log' ERR

BASE="$HOME/leverlex"
LOG="$BASE/logs"
OUT="$BASE/output"
PLUG="$BASE/plugins"
CONF="$BASE/configs"

mkdir -p "$LOG" "$OUT" "$PLUG" "$CONF"

echo "[INIT] Leverlex Real Engine Booting..."

#############################################
# AI GUARD
#############################################

exec 2>>"$LOG/errors.log"

#############################################
# DEPENDENCY MANAGER (REAL TOOLS)
#############################################

install_tools() {
    echo "[TOOLS] Checking dependencies..."

    command -v git >/dev/null || pkg install git -y
    command -v node >/dev/null || pkg install nodejs -y
    command -v python >/dev/null || pkg install python -y
    command -v pip >/dev/null || pkg install python-pip -y

    echo "[TOOLS] All required tools installed"
}

#############################################
# REAL SYSTEM MONITOR
#############################################

system_monitor() {
    echo "[MONITOR] Capturing real system stats..."

    top -b -n 1 | head -15 >> "$LOG/system.log"
    df -h >> "$LOG/system.log"
    free -m >> "$LOG/system.log" 2>/dev/null || true
}

#############################################
# CHANGE DETECTOR
#############################################

detect_changes() {
    git status --porcelain 2>/dev/null | grep . && echo "changed" || echo "nochange"
}

#############################################
# VERSION ENGINE
#############################################

versioning() {
    FILE="$BASE/VERSION"
    [ ! -f "$FILE" ] && echo "1.0.0" > "$FILE"

    IFS='.' read -r a b c <<< "$(cat $FILE)"
    c=$((c+1))
    echo "$a.$b.$c" > "$FILE"

    git add VERSION 2>/dev/null || true
    git commit -m "auto: version bump" 2>/dev/null || true
}

#############################################
# CHANGELOG
#############################################

changelog() {
    FILE="$BASE/CHANGELOG.md"

    echo "" >> "$FILE"
    echo "## $(date)" >> "$FILE"
    git log -5 --pretty=format:"- %s" >> "$FILE" 2>/dev/null || echo "- init" >> "$FILE"

    git add CHANGELOG.md 2>/dev/null || true
    git commit -m "auto: changelog update" 2>/dev/null || true
}

#############################################
# REAL BUILD SYSTEM
#############################################

build_system() {
    echo "[BUILD] Running real builds..."

    if [ -f package.json ]; then
        npm install
        npm run build || true
    fi

    if [ -f requirements.txt ]; then
        pip install -r requirements.txt
    fi

    if [ -f Makefile ]; then
        make || true
    fi
}

#############################################
# AUTO PROJECT GENERATOR
#############################################

generate_project() {
    NAME="app_$(date +%s)"
    DIR="$OUT/$NAME"

    mkdir -p "$DIR"

    echo "<h1>Live Generated App</h1>" > "$DIR/index.html"

    echo "[GENERATOR] Project created: $NAME"
}

#############################################
# REAL API LAUNCHER
#############################################

run_api() {
    echo "[API] Launching real API..."

    cat <<EOF > "$OUT/server.py"
from http.server import BaseHTTPRequestHandler, HTTPServer

class H(BaseHTTPRequestHandler):
    def do_GET(self):
        self.send_response(200)
        self.end_headers()
        self.wfile.write(b'Leverlex Live API')

HTTPServer(('0.0.0.0', 8080), H).serve_forever()
EOF

    python "$OUT/server.py" &
}

#############################################
# REAL DEPLOYMENT ENGINE
#############################################

deploy() {
    echo "[DEPLOY] Executing real deployment..."

    git add . 2>/dev/null || true
    git commit -m "auto: deploy sync" 2>/dev/null || true
    git push origin main 2>/dev/null || echo "[WARN] Git push skipped"

}

#############################################
# PLUGIN SYSTEM
#############################################

run_plugins() {
    for p in "$PLUG"/*; do
        [ -f "$p/run.sh" ] && bash "$p/run.sh"
    done
}

#############################################
# SELF HEALING
#############################################

self_heal() {
    if [ $? -ne 0 ]; then
        echo "[HEAL] Resetting repo..."
        git reset --hard 2>/dev/null || true
        git clean -fd 2>/dev/null || true
    fi
}

#############################################
# AUTO ALIGNMENT (REAL)
#############################################

auto_align() {
    echo "[ALIGN] Optimizing..."

    find "$BASE" -type f -name "*.log" -size +2M -delete
}

#############################################
# CORE ENGINE
#############################################

engine() {

    echo "[ENGINE] Cycle start"

    install_tools
    system_monitor

    STATE=$(detect_changes)

    if [ "$STATE" = "changed" ]; then
        versioning
        changelog
        build_system
        generate_project
        run_api
    fi

    run_plugins
    deploy
    auto_align
    self_heal

    echo "[ENGINE] Cycle complete"
}

#############################################
# CONTINUOUS EXECUTION
#############################################

while true; do
    engine
    sleep 15
done